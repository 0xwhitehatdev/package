name: build-arm64-darwin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          uname -a
          clang --version
          xcrun --show-sdk-path

      - name: Build
        run: |
          mkdir -p build
          clang hello.c -O2 -o build/hello

      - name: Inspect binary
        run: |
          file build/hello
          otool -hv build/hello || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-arm64-apple-darwin
          path: build/hello
